# Sentinel — docker-compose for freqtrade (Phase 0)
#
# 启动：
#   cd deploy && cp .env.example .env && 编辑 .env（明天起床后再做）
#   docker compose pull
#   docker compose up -d
#
# 访问 FreqUI：http://localhost:8080
# 默认账号：sentinel / (在 .env 的 API_PASSWORD 中设置)
#
# 停止：
#   docker compose down
#
# 日志：
#   docker compose logs -f freqtrade

services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: sentinel-freqtrade
    restart: unless-stopped
    # 加载 .env 文件，把变量注入到 freqtrade 容器（freqtrade 通过 FREQTELEGRAM__TELEGRAM_TOKEN 等环境变量读取）
    env_file:
      - .env
    # 代理环境变量：让 aiohttp（freqtrade 异步 HTTP 客户端）走本地 ClashX 代理访问交易所
    environment:
      HTTP_PROXY: "http://127.0.0.1:7890"
      HTTPS_PROXY: "http://127.0.0.1:7890"
      http_proxy: "http://127.0.0.1:7890"
      https_proxy: "http://127.0.0.1:7890"
    # 用 host 网络模式：让容器共享宿主机网络栈，能直接访问 127.0.0.1:7890 上的本地代理
    # 这是国内环境下让容器内 Python 访问交易所最可靠的方式
    # （之前用 bridge 模式 + host.docker.internal 在 OrbStack 下不可达）
    network_mode: host
    volumes:
      # 挂载 user_data 持久化配置、策略、SQLite、日志
      - ./user_data:/freqtrade/user_data
      # 挂载启动脚本（做 ${VAR} 替换后再启动 freqtrade）
      - ./start.sh:/freqtrade/start.sh:ro
    # 注意：用 host 网络模式时 ports 映射无效（容器已用宿主网络），FreqUI 在宿主机 8080 直接暴露
    entrypoint: ["/bin/sh", "/freqtrade/start.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

