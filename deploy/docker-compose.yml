# Sentinel — docker-compose for freqtrade (Phase 0)
#
# 启动：
#   cd deploy && cp .env.example .env && 编辑 .env（明天起床后再做）
#   docker compose pull
#   docker compose up -d
#
# 访问 FreqUI：http://localhost:8080
# 默认账号：sentinel / (在 .env 的 API_PASSWORD 中设置)
#
# 停止：
#   docker compose down
#
# 日志：
#   docker compose logs -f freqtrade

services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: sentinel-freqtrade
    restart: unless-stopped
    # 加载 .env 文件，把变量注入到 freqtrade 容器（freqtrade 通过 FREQTELEGRAM__TELEGRAM_TOKEN 等环境变量读取）
    env_file:
      - .env
    # 用 host 网络模式：让容器共享宿主机网络栈，能直接访问 127.0.0.1:7890 上的本地代理
    # 这是国内环境下让容器内 Python 访问交易所最可靠的方式
    # （之前用 bridge 模式 + host.docker.internal 在 OrbStack 下不可达）
    network_mode: host
    volumes:
      # 挂载 user_data 持久化配置、策略、SQLite、日志
      - ./user_data:/freqtrade/user_data
    # 注意：用 host 网络模式时 ports 映射无效（容器已用宿主网络），FreqUI 在宿主机 8080 直接暴露
    # 用 python 做 ${VAR} 替换（镜像精简版无 envsubst）；生成 /tmp/dry-run-runtime.json
    # 不影响宿主机上保留占位符的 dry-run.json —— 这样敏感字段不会进 git
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      python3 -c 'import os,sys; sys.stdout.write(open("/freqtrade/user_data/config/dry-run.json").read().replace("${API_PASSWORD}", os.environ.get("API_PASSWORD","")).replace("${API_JWT_SECRET}", os.environ.get("API_JWT_SECRET","")))' > /tmp/dry-run-runtime.json &&
      freqtrade trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:///user_data/tradesv3.sqlite
      --config /tmp/dry-run-runtime.json
      --strategy S1TrendFollow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

